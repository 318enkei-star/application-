<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>肉を焼く匠をめざせ</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: #1a1a1a; color: #fff;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden;
            width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        #ui-header {
            width: 100%; background: #222; padding: 10px 0;
            display: flex; justify-content: space-around; border-bottom: 3px solid #e67e22; z-index: 10;
        }
        #timer-container { font-size: 16px; font-weight: bold; text-align: center; }
        #timer { font-size: 24px; color: #2ecc71; }
        canvas { background: #333; border-radius: 10px; margin-top: 5px; box-shadow: inset 0 0 50px #000; display: block; }
        #ui-footer { 
            margin-top: auto; 
            padding: 10px 20px calc(90px + env(safe-area-inset-bottom)); 
            width: 100%; max-width: 450px; display: flex; flex-direction: column; z-index: 10; 
        }
        #btn-mesh {
            width: 100%; height: 75px; font-size: 24px; font-weight: bold;
            background: linear-gradient(#e67e22, #d35400); color: white;
            border: none; border-radius: 40px; cursor: pointer;
            box-shadow: 0 6px 0 #a04000;
        }
        #btn-mesh:active { transform: translateY(2px); box-shadow: 0 2px 0 #a04000; }
        #btn-mesh:disabled { opacity: 0.3; filter: grayscale(1); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-box { background: #222; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #e67e22; width: 90%; max-width: 400px; }
        .tutorial-area { text-align: left; background: #333; padding: 15px; border-radius: 10px; font-size: 14px; margin: 15px 0; line-height: 1.6; }
        .start-btn { width: 100%; padding: 20px; font-size: 22px; font-weight: bold; background: #e67e22; color: white; border: none; border-radius: 12px; cursor: pointer; }
        
        /* カウントダウン用アニメーション */
        #count-display {
            font-size: 120px; font-weight: bold; color: #f1c40f;
            text-shadow: 0 0 20px rgba(230, 126, 34, 0.8);
            animation: count-pulse 1s ease-out infinite;
            display: none; pointer-events: none; z-index: 2000;
        }
        @keyframes count-pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .val { font-size: 20px; font-weight: bold; color: #f1c40f; }
        .label { font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

<div id="ui-header">
    <div style="text-align:center"><div class="label">売上</div><div id="score" class="val">0</div></div>
    <div id="timer-container">残り時間<br><span id="timer">30</span></div>
    <div style="text-align:center"><div class="label">網の汚れ</div><div id="dirt" class="val">0%</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="ui-footer">
    <button id="btn-mesh" disabled>網を交換する (¥300)</button>
</div>

<div id="count-overlay" class="overlay" style="display:none; background: rgba(0,0,0,0.5);">
    <div id="count-display">3</div>
</div>

<div id="start-overlay" class="overlay">
    <div class="modal-box">
        <h1 style="color: #e67e22; margin: 0;">肉を焼く匠をめざせ</h1>
        <div class="tutorial-area">
            <p style="margin-top:0; color:#f1c40f; font-weight:bold;"> 受付頂いてお待ちくださーい！</p>
            ・下の皿から肉を<b>網へドラッグ</b>！<br>
            ・ゲージが<b>緑色</b>になったらタップで回収！<br>
            ・網が汚れると焼けるのが遅くなるぞ！<br>
            ・<b>網交換</b>をうまく使って売上を伸ばそう！
            ・制限時間は<b>30秒！</b>
        </div>
        <button class="start-btn" onclick="preStart()">修行開始</button>
    </div>
</div>

<div id="result-overlay" class="overlay" style="display:none;">
    <div class="modal-box">
        <h2>本日の営業終了！</h2>
        <div class="label">最終売上</div>
        <div id="final-score" style="font-size: 54px; color: #f1c40f; font-weight: bold;">0</div>
        <button class="start-btn" onclick="location.reload()" style="margin-top:20px;">もう一度挑戦</button>
    </div>
</div>

<script>
    const images = {};
    const imageFiles = {
        nami: 'meat_nami.png', jyo: 'meat_jyo.png', tan: 'meat_tan.png',
        horu: 'meat_horu.png', ok: 'meat_ok.png', bad: 'meat_bad.png'
    };

    Object.keys(imageFiles).forEach(key => {
        images[key] = new Image();
        images[key].src = imageFiles[key];
    });

    const MEAT_TYPES = {
        nami: { imgKey: 'nami', score: 200, speed: 0.6,  dirt: 0.02 },
        jyo:  { imgKey: 'jyo',  score: 500, speed: 0.9,  dirt: 0.04 },
        tan:  { imgKey: 'tan',  score: 300, speed: 0.4,  dirt: 0.01 },
        horu: { imgKey: 'horu', score: 600, speed: 1.5,  dirt: 0.08 }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisp = document.getElementById('score');
    const dirtDisp = document.getElementById('dirt');
    const timerDisp = document.getElementById('timer');
    const meshBtn = document.getElementById('btn-mesh');
    
    const countOverlay = document.getElementById('count-overlay');
    const countDisplay = document.getElementById('count-display');
    const startOverlay = document.getElementById('start-overlay');
    const resultOverlay = document.getElementById('result-overlay');
    const finalScoreDisp = document.getElementById('final-score');

    const width = Math.min(window.innerWidth * 0.95, 450);
    const height = window.innerHeight * 0.55; 
    canvas.width = width;
    canvas.height = height;

    const plateY = height * 0.78; 
    let score = 0, dirt = 0, timeLeft = 30;
    let meats = [], particles = [], gameActive = false;
    let timerInterval, spawnInterval;

    // ボタンを押した時のカウントダウン処理
    window.preStart = function() {
        startOverlay.style.display = 'none';
        countOverlay.style.display = 'flex';
        countDisplay.style.display = 'block';
        
        let count = 3;
        countDisplay.innerText = count;

        const cd = setInterval(() => {
            count--;
            if (count > 0) {
                countDisplay.innerText = count;
            } else if (count === 0) {
                countDisplay.innerText = "GO!";
                countDisplay.style.color = "#2ecc71";
            } else {
                clearInterval(cd);
                countOverlay.style.display = 'none';
                startGame();
            }
        }, 1000);
    };

    window.startGame = function() {
        gameActive = true;
        for(let i=0; i<4; i++) meats.push(new Meat(true));
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisp.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
        spawnInterval = setInterval(() => {
            if (meats.filter(m => m.isOnPlate).length < 5) meats.push(new Meat(true));
        }, 1000);
    };

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        clearInterval(spawnInterval);
        finalScoreDisp.innerText = score;
        resultOverlay.style.display = 'flex';
    }

    class Meat {
        constructor(isOnPlate = true) {
            const keys = Object.keys(MEAT_TYPES);
            this.type = MEAT_TYPES[keys[Math.floor(Math.random() * keys.length)]];
            this.w = 64; this.h = 64;
            this.isOnPlate = isOnPlate;
            this.cook = 0;
            this.isDragging = false;
            this.status = 'raw';
            if(isOnPlate) this.setPlatePos();
        }
        setPlatePos() {
            for(let i=0; i<5; i++) {
                let tx = 15 + i * (width/5.2);
                let ty = plateY + (height - plateY)/4;
                if(!meats.some(m => m.isOnPlate && m.x === tx)) {
                    this.x = tx; this.y = ty; return;
                }
            }
            this.x = 15; this.y = plateY + 10;
        }
        update() {
            if (!gameActive || this.isDragging || this.isOnPlate) return;
            let efficiency = Math.max(0.1, (100 - dirt) / 100);
            this.cook += this.type.speed * efficiency;
            dirt += this.type.dirt * (this.status === 'bad' ? 2 : 1);
            if (this.cook > 100) this.status = 'ok';
            if (this.cook > 180) this.status = 'bad';
        }
        draw() {
            let currentImg;
            if (this.status === 'bad') currentImg = images.bad;
            else if (this.status === 'ok') currentImg = images.ok;
            else currentImg = images[this.type.imgKey];
            if (currentImg.complete) {
                ctx.drawImage(currentImg, this.x, this.y, this.w, this.h);
            } else {
                ctx.fillStyle = "#444";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            if(!this.isOnPlate) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x, this.y - 12, this.w, 8);
                let barColor = this.status === 'bad' ? "#333" : (this.status === 'ok' ? "#2ecc71" : "#e74c3c");
                ctx.fillStyle = barColor;
                ctx.fillRect(this.x, this.y - 12, (Math.min(this.cook, 200) / 200) * this.w, 8);
            }
        }
    }

    meshBtn.addEventListener('click', () => {
        if (gameActive && score >= 300) {
            score -= 300; dirt = 0;
            particles.push({ x: width/2 - 60, y: height/2, text: "網ピカピカ！✨", life: 40, color: "#3498db" });
        }
    });

    let activeMeat = null, offset = { x: 0, y: 0 };
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function startAction(e) {
        if (!gameActive) return;
        const pos = getPos(e);
        for (let i = meats.length - 1; i >= 0; i--) {
            const m = meats[i];
            if (pos.x > m.x && pos.x < m.x + m.w && pos.y > m.y && pos.y < m.y + m.h) {
                if (m.status === 'ok') {
                    score += m.type.score;
                    particles.push({ x: m.x, y: m.y, text: `+${m.type.score}`, life: 30, color: "#f1c40f" });
                    meats.splice(i, 1); return;
                } else if (m.status === 'bad') {
                    score = Math.max(0, score - 100);
                    particles.push({ x: m.x, y: m.y, text: "焦げ！ -100", life: 40, color: "#e74c3c" });
                    meats.splice(i, 1); return;
                } else {
                    activeMeat = m; m.isDragging = true;
                    offset.x = pos.x - m.x; offset.y = pos.y - m.y; return;
                }
            }
        }
    }
    function moveAction(e) { if (activeMeat) { const pos = getPos(e); activeMeat.x = pos.x - offset.x; activeMeat.y = pos.y - offset.y; } }
    function endAction() { 
        if (activeMeat) { 
            if (activeMeat.y < plateY - 10) activeMeat.isOnPlate = false;
            else { activeMeat.isOnPlate = true; activeMeat.setPlatePos(); }
            activeMeat.isDragging = false; activeMeat = null; 
        } 
    }
    canvas.addEventListener('mousedown', startAction);
    window.addEventListener('mousemove', moveAction);
    window.addEventListener('mouseup', endAction);
    canvas.addEventListener('touchstart', (e) => { startAction(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { moveAction(e); }, {passive: false});
    canvas.addEventListener('touchend', endAction);

    function loop() {
        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 1;
        for(let i=0; i<width; i+=25) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,plateY); ctx.stroke(); }
        for(let i=0; i<plateY; i+=25) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(width,i); ctx.stroke(); }
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(0, plateY, width, height - plateY);
        ctx.fillStyle = "#e67e22"; ctx.fillRect(0, plateY, width, 4);
        meats.forEach(m => { m.update(); m.draw(); });
        particles.forEach((p, i) => {
            ctx.fillStyle = p.color || "#fff"; ctx.font = "bold 24px sans-serif"; ctx.fillText(p.text, p.x, p.y);
            p.y -= 1; p.life--; if (p.life <= 0) particles.splice(i, 1);
        });
        scoreDisp.innerText = score;
        dirtDisp.innerText = Math.floor(Math.min(100, dirt)) + "%";
        meshBtn.disabled = score < 300;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
